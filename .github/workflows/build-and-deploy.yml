name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install LaTeX
      run: sudo apt-get install -y texlive-latex-extra texlive-fonts-extra latexmk

    - name: Build resume
      run: latexmk -pdf -interaction=nonstopmode resume/resume.tex -outdir=resume/out

    - name: Copy resume into site
      run: |
        mkdir -p static/pdfs
        cp resume/out/resume.pdf static/pdfs/resume.pdf

    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3.0.0
      with:
        hugo-version: 'latest'
        extended: true

    - name: Build site
      run: hugo --minify

    - uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4


