<style>
  /* TODO: replace with woff2 when Apple supports that someday */
  @font-face {
    font-family: 'IBM Plex Sans';
    src: url('/fonts/IBMPlexSans-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  
  @font-face {
    font-family: 'IBM Plex Sans';
    src: url('/fonts/IBMPlexSans-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }

  @font-face {
    font-family: 'IBM Plex Sans';
    src: url('/fonts/IBMPlexSans-Italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
  }

  @font-face {
    font-family: 'IBM Plex Mono';
    src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  
  @font-face {
    font-family: 'IBM Plex Mono';
    src: url('/fonts/IBMPlexMono-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }

  @font-face {
    font-family: 'IBM Plex Mono';
    src: url('/fonts/IBMPlexMono-Italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
  }
  
  :root {
    --radius: 12px;
    --font-main: 'IBM Plex Sans', Verdana, sans-serif;
    --font-secondary: 'IBM Plex Sans', Verdana, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-scale: 1em;
    --background-color: #fff;
    --heading-color: #222;
    --text-color: #444;
    --link-color: #3273dc;
    --visited-color: #244fa8;
    --blockquote-color: #222;
    --table-bg:        #f8fafc;  /* table container */
    --row-bg:          #ffffff;  /* odd rows */
    --row-alt-bg:      #f1f5f9;  /* even rows */
    --row-hover-bg:    #e2e8f0;
    --table-border:    #cbd5e1;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background-color: #121212;
      --heading-color: #eee;
      --text-color: #ddd;
      --link-color: #8cc2dd;
      --visited-color: #5a8fb3;
      --blockquote-color: #ccc;
      --table-bg:        #0f172a;
      --row-bg:          #111827;
      --row-alt-bg:      #1f2933;
      --row-hover-bg:    #334155;
      --table-border:    #475569;
    }
  }

  /* shader needs to fullmax out width, so we do this for padding
  that doesn't look ugly as sin. */
  .content-wrapper {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 20px;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.55;
    color: var(--text-color);
    min-height: 100dvh; /* dvh for mobile */
    display: flex;
    flex-direction: column;
  }
  
  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    flex: 1; /* consume all vertical slack */
    line-height: 1.6;
  }

  table {
    background: var(--table-bg);
    border-collapse: separate;
    border-spacing: 0;
    border-radius: var(--radius);
    width: 100%;
    overflow: hidden;
  }

  th,
  td {
      padding: 0.6rem 0.8rem;
      text-align: left;
      vertical-align: middle;
  }
  
  tbody tr {
      background: var(--row-bg);
  }

  tbody tr:nth-child(even) {
      background: var(--row-alt-bg);
  }

  tbody tr:hover {
      background: var(--row-hover-bg);
  }

  tbody tr + tr td {
      border-top: 1px solid var(--table-border);
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: var(--font-mono);
    padding: 2px;
    border-radius: 3px;
    text-wrap: wrap;
  }

  blockquote {
    border-left: 1px solid #999;
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    /*padding: 25px 0;*/
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

</style>
