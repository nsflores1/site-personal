<script>
(function () {

  // read OS color preference once, update on change.
  const mq = window.matchMedia('(prefers-color-scheme: dark)');
  let isDark = mq.matches ? 1.0 : 0.0;
  mq.addEventListener('change', e => { isDark = e.matches ? 1.0 : 0.0; });

  const vs = `attribute vec2 p; void main(){ gl_Position = vec4(p,0,1); }`;
  const fs = `
    precision mediump float;
    uniform vec2  u_res;
    uniform float u_t;
    uniform float u_dark;
    uniform float u_taper;

    void main(){
      vec2 uv = gl_FragCoord.xy / u_res;
      vec2 p  = uv * vec2(u_res.x / u_res.y, 1.0);

      float edge  = mix(uv.y, 1.0 - uv.y, u_taper);
      float taper = smoothstep(0.0, 0.72, edge);

      vec2 epic = vec2(
        0.5 + sin(u_t * 0.09) * 0.38,
        0.4 + cos(u_t * 0.07) * 0.28
      );
      vec2 s1 = vec2(0.3 + cos(u_t * 0.13) * 0.22, 0.6 + sin(u_t * 0.11) * 0.18);
      vec2 s2 = vec2(0.7 + sin(u_t * 0.17) * 0.20, 0.3 + cos(u_t * 0.15) * 0.22);
      vec2 s3 = vec2(0.5 + cos(u_t * 0.21) * 0.28, 0.7 + sin(u_t * 0.19) * 0.16);

      float spd = 1.4;
      float f =
          sin(length(p - epic) * 20.0 - u_t * spd      ) * 1.8
        + sin(length(p - s1)   * 16.0 - u_t * spd * 0.9) * 0.7
        + sin(length(p - s2)   * 18.0 - u_t * spd * 1.1) * 0.7
        + sin(length(p - s3)   * 14.0 - u_t * spd * 0.8) * 0.7;
      f /= 3.9;
      f *= taper * taper;

      vec3 bg  = mix(vec3(1.00,1.00,1.00), vec3(0.071,0.071,0.071), u_dark);
      vec3 mid = mix(vec3(0.68,0.80,0.90), vec3(0.08,0.22,0.44), u_dark);
      vec3 hi  = mix(vec3(0.20,0.44,0.74), vec3(0.30,0.62,0.96), u_dark);

      vec3 col = f < -0.15 ? bg : f < 0.3 ? mid : hi;
      col = mix(bg, col, taper * taper);

      gl_FragColor = vec4(col, 1.0);
    }
  `;

  // takes a canvas ID and a taper value.
  // returns nothing, just starts its own render loop and lives there.
  // if WebGL isn't available, returns.
  function initWave(canvasId, taper) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const gl = canvas.getContext('webgl');
    if (!gl) return;

    function compile(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aP = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(aP);
    gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);

    const uRes   = gl.getUniformLocation(prog, 'u_res');
    const uTime  = gl.getUniformLocation(prog, 'u_t');
    const uDark  = gl.getUniformLocation(prog, 'u_dark');
    const uTaper = gl.getUniformLocation(prog, 'u_taper');

    function resize() {
      canvas.width  = canvas.clientWidth  * (window.devicePixelRatio || 1);
      canvas.height = canvas.clientHeight * (window.devicePixelRatio || 1);
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const t0 = performance.now();
    function frame() {
      gl.uniform2f(uRes,   canvas.width, canvas.height);
      gl.uniform1f(uTime,  (performance.now() - t0) / 1000);
      gl.uniform1f(uDark,  isDark);
      gl.uniform1f(uTaper, taper);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }
    frame();
  }
  initWave('wave-footer', 1.0); // 1.0 = fades upward, toward content

})();
</script>
